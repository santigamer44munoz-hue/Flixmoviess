<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Plataforma</title>

<style>
body { margin:0; background:#141414; color:white; font-family:Arial; }
header { background:black; padding:15px; text-align:center; }
.container { padding:15px; }
.admin { display:none; background:#222; padding:10px; margin-bottom:15px; border-radius:8px; }
.movies { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.movie { position: relative; background:#1a1a1a; padding:5px; border-radius:8px; }
.movie img { width:100%; border-radius:6px; cursor:pointer; }
.delete-btn { position:absolute; top:5px; right:5px; background:red; border:none; color:white; padding:3px 6px; cursor:pointer; display:none; }
.modal, .player { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; flex-direction:column; }
.player iframe { width:95%; height:60%; }
.download-btn { margin-top:10px; background:#0f9d58; color:white; border:none; padding:10px; cursor:pointer; border-radius:5px; }
.close { position:absolute; top:20px; right:20px; font-size:30px; cursor:pointer; }
input { width:100%; padding:8px; margin:5px 0; }
</style>
</head>

<body>

<header>
🎬 MI PLATAFORMA
<br>
<button onclick="login()">Modo Admin</button>
</header>

<div class="container">

<div class="admin" id="adminPanel">
<h3>Panel Admin</h3>
<input type="text" id="title" placeholder="Título">
<input type="file" id="image" accept="image/*">
<input type="text" id="video" placeholder="Link video (embed)">
<input type="text" id="download" placeholder="Link descarga">
<button onclick="addMovie()">Agregar</button>
</div>

<input type="text" id="search" placeholder="Buscar película..." onkeyup="searchMovies()">
<div class="movies" id="movies"></div>

</div>

<div class="modal" id="modal">
  <h2>🎬 Ver película</h2>
  <button onclick="confirmPlay()">▶ Reproducir</button>
</div>

<div class="player" id="player">
<span class="close" onclick="closePlayer()">✖</span>
<iframe id="videoPlayer" src="" allowfullscreen></iframe>
<a id="downloadLink" href="#" target="_blank">
  <button class="download-btn">⬇️ Descargar</button>
</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVDToFKnLEtZwyAGIpa3THKI6mzLwvW30",
  authDomain: "movieflix-fe5b1.firebaseapp.com",
  projectId: "movieflix-fe5b1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isAdmin = false;
let movies = [];

let currentVideo = "";
let currentDownload = "";

/* 🔐 LOGIN REAL */
window.login = async function() {
  const email = prompt("Correo:");
  const pass = prompt("Contraseña:");

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("Admin activado 🔥");
    renderMovies();
  } catch {
    alert("Error de login");
  }
};

/* 🎬 RENDER */
function renderMovies(list = movies) {
  const container = document.getElementById("movies");
  container.innerHTML = "";

  list.forEach((m) => {
    container.innerHTML += `
      <div class="movie">
        ${isAdmin ? `<button class="delete-btn" onclick="deleteMovie('${m.id}')">X</button>` : ""}
        <img src="${m.image}" onclick="openModal('${m.video}', '${m.download || ''}')">
        <p>${m.title}</p>
      </div>
    `;
  });

  if (isAdmin) {
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.style.display = "block";
    });
  }
}

/* ➕ AGREGAR */
window.addMovie = async function() {
  if (!isAdmin) return alert("No autorizado");

  const title = document.getElementById("title").value;
  const file = document.getElementById("image").files[0];
  const video = document.getElementById("video").value;
  const download = document.getElementById("download").value;

  if (!title || !file || !video) return alert("Completa todo");

  const reader = new FileReader();

  reader.onload = async function(e) {
    await addDoc(collection(db, "movies"), {
      title,
      image: e.target.result,
      video,
      download
    });

    alert("Película subida 🔥");
    loadMovies();
  };

  reader.readAsDataURL(file);
};

/* 🗑️ BORRAR */
window.deleteMovie = async function(id) {
  if (!isAdmin) return alert("No autorizado");

  if (confirm("¿Eliminar película?")) {
    await deleteDoc(doc(db, "movies", id));
    loadMovies();
  }
};

/* 📥 CARGAR */
async function loadMovies() {
  const querySnapshot = await getDocs(collection(db, "movies"));
  movies = [];

  querySnapshot.forEach(docSnap => {
    movies.push({ id: docSnap.id, ...docSnap.data() });
  });

  renderMovies();
}

/* 🔍 BUSCAR */
window.searchMovies = function() {
  const value = document.getElementById("search").value.toLowerCase();
  renderMovies(movies.filter(m => m.title.toLowerCase().includes(value)));
};

/* ▶️ PLAYER */
window.openModal = function(video, download) {
  currentVideo = video;
  currentDownload = download;
  document.getElementById("modal").style.display = "flex";
};

window.confirmPlay = function() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("player").style.display = "flex";
  document.getElementById("videoPlayer").src = currentVideo;

  const dl = document.getElementById("downloadLink");
  dl.href = currentDownload || "#";
  dl.style.display = currentDownload ? "block" : "none";
};

window.closePlayer = function() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoPlayer").src = "";
};

/* 🚀 INICIO */
loadMovies();

</script>

</body>
</html>
